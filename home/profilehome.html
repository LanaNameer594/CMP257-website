    <body>
        <header class="nav_style">

                <div class="container-fluid">

                    <button class="navbar-toggler nav_style" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                                <div id="pickModal" class="modal">
                                    <div class="modal-content">
                                    <button class="modal-close" type="button">×</button>
                                    <h2>Label</h2>
                                    <!--whatever form content you have-->
                                    <div class="wrapper">
                                        <form action="">

                                            <div class="input-box">
                                                <input class="username" type="text" placeholder="Username" required>
                                            </div>
                                            <div class="input-box">
                                                <input type="password" placeholder="Password" required>
                                                
                                            </div>
                                            <div class="remember-forgot">

                                            </div>
                                            <button type="submit" class="btn">Sign In</button>

                                                <p>

                                                </p>

                            </div>
                        </div>
