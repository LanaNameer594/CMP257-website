<!DOCTYPE html>
<html>
    <head>
        <title>Shopping List</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>        
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="nav_style">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid">
                    <a class="navbar-brand title_font" href="home.html">The Fridge</a>
                    <button class="navbar-toggler nav_style" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav ms-auto">
                            <a class="nav-link nav_style" href="recipes.html">Recipes</a>
                            <a class="nav-link nav_style" href="shopping_list.html">Shopping List</a>
                            <a class="nav-link nav_style" href="profile.html">My Profile</a>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

        <div class="rest">
            <div class="patch">
                <img src="images/Patch.png">
            </div>

            <section>
                <div class="container-fluid text-center no-margin">
                    <div class="row">
                        <div class="col-6 line basket custom-col">
                        <div class="basket-container">
                            <img src="images/Shopping Basket Shadow.png" class="basket-bg">
                            <img src="images/eggs.png" class="item eggs">
                            <img src="images/sugar.png" class="item sugar">
                            <img src="images/milk.png" class="item milk">
                            <img src="images/chicken.png" class="item chicken">
                            <img src="images/cherries.png" class="item cherries">
                        </div>
                    </div>
                        <div class="col-6 receipt custom-col">
                            <!--
                            <img src="images/Receipt Shadow.png">
                        -->
                            <h2 class="title_font">The Fridge</h2>
                            <p class="groceries">GROCERIES</p>
                            <p class="info">DATE</p>
                            <p class="info">NAME</p>
                            <table class="list">
                                <thead>
                                    <tr>
                                        <td class="begin">QTY</td>
                                        <td>ITEM</td>
                                        <td class="length">AMT</td>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="begin">01</td>
                                        <td>EGGS</td>
                                        <td class="length">2 PCS</td>
                                    </tr>
                                    <tr>
                                        <td class="begin">02</td>
                                        <td>MILK</td>
                                        <td class="length">200 L</td>
                                    </tr>
                                    <tr>
                                        <td class="begin">03</td>
                                        <td>SUGAR</td>
                                        <td class="length">400 G</td>
                                    </tr>
                                    <tr>
                                        <td class="begin">04</td>
                                        <td>CHERRIES</td>
                                        <td class="length">300 G</td>
                                    </tr>
                                    <tr>
                                        <td class="begin">05</td>
                                        <td>CHICKEN</td>
                                        <td class="length">1000 G</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="thanks">
                                <p>THANK YOU FOR VISITING!</p>
                                <img src="images/barcode.png">
                            </div>
                        </div>
                    </div>
                </div>

            </section>
        </div>
    </body>
</html>
