<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login Page</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="wrapper">
            <form action="">
                <img src="login.png">
                <div class="input-box">
                    <input class="username" type="text" placeholder="Username" required>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    
                </div>
                <div class="remember-forgot">
                    <a href="#">Forgot password<span id="question-mark">?</span></a>
                </div>
                <button type="submit" class="btn">Sign In</button>
                <div class="register-link">
                    <p>
                        Don't have an account<span id="question-mark">?</span>
                        <a href="#">Register</a>
                    </p>
                </div>
            </form>
        </div>
    </body>
</html>
